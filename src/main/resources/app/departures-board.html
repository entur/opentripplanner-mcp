<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departures</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: linear-gradient(160deg, #0f1117 0%, #1a1030 100%);
               color: #e8e8e8; min-height: 100vh; }
        #board { max-width: 640px; margin: 0 auto; }

        #header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
        #header-left { display: flex; flex-direction: column; gap: 2px; }
        #stop-name { font-size: 16px; font-weight: 800; }
        #live-row { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #a78bfa; }
        #live-dot { width: 5px; height: 5px; border-radius: 50%; background: #a78bfa; flex-shrink: 0;
                    animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
        #refresh-btn { font-size: 11px; padding: 5px 10px; border: 1px solid #3a3a5a;
                       border-radius: 6px; background: #ffffff08; color: #aaa; cursor: pointer; flex-shrink: 0; }
        #refresh-btn:hover { background: #ffffff15; color: #e8e8e8; }
        #refresh-btn:disabled { opacity: 0.4; cursor: default; }

        #refresh-bar { height: 2px; background: #1a1a2e; }
        #refresh-bar-fill { height: 100%; background: #a78bfa; width: 0%;
                            border-radius: 0 2px 2px 0; transition: width 1s linear; }

        #departures-list, #arrivals-list { padding: 4px 0 8px; }

        .dep-card { margin: 4px 8px; background: #ffffff08; border: 1px solid #ffffff0d;
                    border-radius: 8px; padding: 9px 12px;
                    display: grid; grid-template-columns: 56px auto 1fr auto;
                    gap: 8px; align-items: center; }
        .dep-card.next-departure { background: #a78bfa18; border-color: #a78bfa44;
                                   box-shadow: 0 0 0 1px #a78bfa22; }
        .dep-card.delayed .dep-time { color: #ff6b6b; }
        .dep-card.cancelled { opacity: 0.45; }
        .dep-card.cancelled .dep-time { text-decoration: line-through; }

        .dep-time-col { display: flex; flex-direction: column; gap: 1px; }
        .dep-time-aimed { font-size: 10px; color: #ff6b6b; text-decoration: line-through;
                          font-variant-numeric: tabular-nums; }
        .dep-time { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
        .dep-countdown { font-size: 10px; }
        .dep-countdown.soon { color: #4ecdc4; font-weight: 700; }
        .dep-countdown.normal { color: #a78bfa; }
        .dep-countdown.far { color: #666; }
        .dep-countdown.late { color: #ff6b6b; }

        .badge { display: inline-flex; align-items: center; gap: 4px;
                 padding: 3px 8px 3px 6px; border-radius: 20px; font-weight: 700; font-size: 11px; }

        .dep-dest { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
        .dep-dest-name { font-size: 12px; font-weight: 500; white-space: nowrap;
                         overflow: hidden; text-overflow: ellipsis; }
        .dep-plat { font-size: 10px; color: #666; }

        .dep-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
        .occ-widget { display: flex; align-items: center; gap: 4px; }
        .occ-icon { font-size: 11px; opacity: 0.7; }
        .occ-bar-track { width: 36px; height: 7px; border-radius: 4px; background: #2a2a4a; overflow: hidden; }
        .occ-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .occ-bar-fill.teal  { background: #4ecdc4; }
        .occ-bar-fill.amber { background: #ffaa6b; }
        .occ-bar-fill.red   { background: #ff6b6b; }
        .occ-label { font-size: 10px; font-weight: 500; }
        .occ-label.teal  { color: #4ecdc4; }
        .occ-label.amber { color: #ffaa6b; }
        .occ-label.red   { color: #ff6b6b; }

        .dep-alert { margin: 2px 8px; background: #ff6b2218; border: 1px solid #ff6b2233;
                     border-radius: 6px; padding: 5px 10px; font-size: 10px; color: #ffaa6b; }

        #tab-bar { display: flex; padding: 0 8px; border-bottom: 1px solid #ffffff0d; }
        .tab { background: none; border: none; border-bottom: 2px solid transparent; color: #555;
               font-family: inherit; font-size: 12px; font-weight: 600; padding: 8px 12px; cursor: pointer;
               margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
        .tab.active { color: #a78bfa; border-bottom-color: #a78bfa; }
        .tab:hover:not(.active) { color: #aaa; }

        .status-msg { padding: 40px; text-align: center; color: #555; font-size: 15px; }
        .delay-badge { font-size: 10px; color: #e67e22; background: #2a1a0a; border: 1px solid #5a3010; border-radius: 3px; padding: 1px 4px; white-space: nowrap; }
        .delay-badge.delay-ok { color: #27ae60; background: #0a1f0a; border-color: #1a4a1a; }
    </style>
</head>
<body>
<div id="board">
    <div id="header">
        <div id="header-left">
            <span id="stop-name">Loading…</span>
            <span id="live-row" style="display:none">
                <span id="live-dot"></span>
                <span id="live-label"></span>
            </span>
        </div>
        <button id="refresh-btn" disabled>↻ Refresh</button>
    </div>
    <div id="tab-bar">
        <button class="tab active" data-tab="departures">Departures</button>
        <button class="tab" data-tab="arrivals">Arrivals</button>
    </div>
    <div id="refresh-bar"><div id="refresh-bar-fill"></div></div>
    <div id="departures-list"><div class="status-msg">Connecting…</div></div>
    <div id="arrivals-list" style="display:none"></div>
</div>

<rect x="2" y="11.9991455" fill-rule="evenodd" clip-rule="evenodd" fill="currentColor" width="12" height="1"/>`,
    };

    function modeColor(mode) {
        return MODE_COLORS[(mode || "").toLowerCase()] || "#444";
    }

    function modeIcon(mode) {
        const key = (mode || "").toLowerCase();
        if (key === "coach") return MODE_ICONS.bus;
        if (key === "subway") return MODE_ICONS.metro;
        if (key === "rail") return MODE_ICONS.train;
        if (key === "water") return MODE_ICONS.ferry;
        if (key === "air") return MODE_ICONS.plane;
        return MODE_ICONS[key] || "";
    }

    function lineBg(line) {
        return safeHex(line.presentation?.colour) || modeColor(line.transportMode);
    }

    function lineFg(line) {
        return safeHex(line.presentation?.textColour) || "#ffffff";
    }

    const refreshBtn = document.getElementById("refresh-btn");
    const barFill = document.getElementById("refresh-bar-fill");
    const liveRow = document.getElementById("live-row");
    const liveLabelEl = document.getElementById("live-label");
    function updateLiveLabel() {
        liveLabelEl.textContent = t('live_refreshed', ageSecs);
    }
    function updateTabLabels() {
        document.querySelectorAll('.tab').forEach(btn => {
            btn.textContent = btn.dataset.tab === 'departures' ? t('tab_departures') : t('tab_arrivals');
        });
    }

    function applyToolResult(result) {
        try {
            const text = result.content?.find(c => c.type === "text")?.text;
            if (!text) return;
            const data = JSON.parse(text);
            lang = data.language || lang;
            if (data.error) { refreshBtn.disabled = false; refreshBtn.textContent = t('refresh'); showStatus(data.message || data.error); return; }
            const stopPlace = data.stopPlace;
            if (!stopPlace) { showStatus(t('no_data')); return; }
            currentParams = { stop: stopPlace.id, language: lang };
            if (data.numberOfDepartures != null) currentParams.numberOfDepartures = data.numberOfDepartures;
            if (data.timeRangeMinutes != null) currentParams.timeRangeMinutes = data.timeRangeMinutes;
            if (data.transportModes != null) currentParams.transportModes = data.transportModes;
            refreshBtn.disabled = false;
            refreshBtn.textContent = t('refresh');
            updateTabLabels();
            liveRow.style.display = "flex";
            render(stopPlace);
            resetRefreshCycle();
        } catch (e) {
            refreshBtn.disabled = false;
            refreshBtn.textContent = t('refresh');
            showStatus(t('parse_error'));
        }
    }

    app.ontoolresult = applyToolResult;

    await app.connect();

    refreshBtn.addEventListener("click", () => triggerRefresh());

    document.querySelectorAll(".tab").forEach(btn => {
        btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
    });

    async function triggerRefresh() {
        if (!currentParams.stop) return;
        refreshBtn.disabled = true;
        refreshBtn.textContent = t('refreshing');
        try {
            const result = await app.callServerTool({ name: "poll-departures", arguments: currentParams });
            applyToolResult(result);
        } catch (e) {
            refreshBtn.disabled = false;
            refreshBtn.textContent = t('refresh');
        }
    }

    function resetRefreshCycle() {
        clearInterval(autoRefreshTimer);
        clearInterval(ageTimer);
        clearInterval(barTimer);

        ageSecs = 0;
        updateLiveLabel();
        ageTimer = setInterval(() => { ageSecs++; updateLiveLabel(); }, 1000);

        barProgress = 0;
        barFill.style.transition = "none";
        barFill.style.width = "0%";
        requestAnimationFrame(() => requestAnimationFrame(() => {
            barFill.style.transition = "width 1s linear";
        }));
        barTimer = setInterval(() => {
            barProgress = Math.min(100, barProgress + (1000 / REFRESH_INTERVAL) * 100);
            barFill.style.width = barProgress + "%";
        }, 1000);

        autoRefreshTimer = setInterval(() => triggerRefresh(), REFRESH_INTERVAL);
    }

    function esc(v) {
        return String(v ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function showStatus(msg) {
        const html = `<div class="status-msg">${esc(msg)}</div>`;
        document.getElementById("departures-list").innerHTML = html;
        document.getElementById("arrivals-list").innerHTML   = html;
    }

    function safeHex(v) {
        return v && /^[0-9a-fA-F]{3,8}$/.test(v) ? "#" + v : null;
    }

    function fmt(iso) {
        if (!iso) return "--:--";
        return new Date(iso).toLocaleTimeString(lang === 'en' ? 'en-GB' : lang === 'nn' ? 'nn-NO' : 'nb-NO', { hour: "2-digit", minute: "2-digit" });
    }

    function parseDurationSecs(dur) {
        if (!dur) return 0;
        const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?/);
        if (!m) return 0;
        return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseFloat(m[3] || 0);
    }

    function formatDelay(empiricalDelay) {
        if (!empiricalDelay) return "";
        const p50 = parseDurationSecs(empiricalDelay.p50);
        const p90 = parseDurationSecs(empiricalDelay.p90);
        if (p50 < 60) return `<span class="delay-badge delay-ok">${t('usually_on_time')}</span>`;
        const mins = Math.round(p50 / 60);
        const upTo = p90 > p50 + 120 ? `, ${t('up_to', Math.round(p90 / 60))}` : "";
        return `<span class="delay-badge">${t('typically_late', mins)}${upTo}</span>`;
    }

    function countdown(expectedIso, isCancelled) {
        if (isCancelled) return { text: t('cancelled'), cls: "late" };
        if (!expectedIso) return { text: "", cls: "far" };
        const diffMin = Math.round((new Date(expectedIso) - Date.now()) / 60_000);
        if (diffMin < 0) return { text: t('departed'), cls: "far" };
        if (diffMin === 0) return { text: t('now'), cls: "soon" };
        if (diffMin <= 3) return { text: t('in_min', diffMin), cls: "soon" };
        if (diffMin <= 10) return { text: t('in_min', diffMin), cls: "normal" };
        return { text: t('in_min', diffMin), cls: "far" };
    }

    function occupancyDots(status) {
        const levels = {
            EMPTY:                    { pct: 0,   color: "teal",  label: "" },
            MANY_SEATS_AVAILABLE:     { pct: 20,  color: "teal",  label: t('occ_empty') },
            FEW_SEATS_AVAILABLE:      { pct: 55,  color: "teal",  label: t('occ_seats') },
            STANDING_ROOM_ONLY:       { pct: 80,  color: "amber", label: t('occ_busy') },
            FULL:                     { pct: 100, color: "red",   label: t('occ_full') },
            CRUSHED_STANDING_ROOM_ONLY: { pct: 100, color: "red", label: t('occ_full') },
        };
        const info = levels[status] || { pct: 0, color: "teal", label: "" };
        if (!info.label) return "";
        return `<div class="occ-widget">
            <span class="occ-icon">🧍</span>
            <div class="occ-bar-track"><div class="occ-bar-fill ${info.color}" style="width:${info.pct}%"></div></div>
            <span class="occ-label ${info.color}">${info.label}</span>
        </div>`;
    }

    function setActiveTab(tab) {
        document.querySelectorAll(".tab").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.tab === tab);
        });
        document.getElementById("departures-list").style.display = tab === "departures" ? "" : "none";
        document.getElementById("arrivals-list").style.display   = tab === "arrivals"   ? "" : "none";
    }

    function render(stopPlace) {
        document.getElementById("stop-name").textContent = stopPlace.name || t('tab_departures');
        renderList(
            document.getElementById("departures-list"),
            (stopPlace.departures || []).slice(0, 20),
            true
        );
        renderList(
            document.getElementById("arrivals-list"),
            (stopPlace.arrivals || []).slice(0, 20),
            false
        );
    }

    function renderList(list, calls, showNextHighlight) {
        if (calls.length === 0) {
            list.innerHTML = `<div class="status-msg">${showNextHighlight ? t('no_departures') : t('no_arrivals')}</div>`;
            return;
        }
        list.innerHTML = "";
        let nextSet = false;
        for (const call of calls) {
            const aimed    = showNextHighlight ? call.aimedDepartureTime    : call.aimedArrivalTime;
            const expected = showNextHighlight ? call.expectedDepartureTime  : call.expectedArrivalTime;
            const delayed  = !call.cancellation && expected && aimed
                             && new Date(expected) - new Date(aimed) > 60_000;
            const cancelled = call.cancellation;
            const line = call.serviceJourney?.line || {};
            const { text: cdText, cls: cdCls } = countdown(expected, cancelled);

            const classes = ["dep-card"];
            if (showNextHighlight && !nextSet && !cancelled) { classes.push("next-departure"); nextSet = true; }
            if (delayed)   classes.push("delayed");
            if (cancelled) classes.push("cancelled");

            const bg   = esc(lineBg(line));
            const fg   = esc(lineFg(line));
            const icon = modeIcon(line.transportMode);
            const card = document.createElement("div");
            card.className = classes.join(" ");
            card.innerHTML = `
                <div class="dep-time-col">
                    ${delayed ? `<span class="dep-time-aimed">${fmt(aimed)}</span>` : ""}
                    <span class="dep-time">${fmt(expected)}</span>
                    <span class="dep-countdown ${cdCls}">${cdText}</span>
                </div>
                <span class="badge" style="background:${bg};color:${fg};"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">${icon}</svg>${esc(line.publicCode || "?")}</span>
                <div class="dep-dest">
                    <span class="dep-dest-name">${esc(call.destinationDisplay?.frontText || "")}</span>
                    <span class="dep-plat">${call.quay?.publicCode ? esc(t('platform', call.quay.publicCode)) : ""}</span>
                </div>
                <div class="dep-right">${occupancyDots(call.occupancyStatus)}${formatDelay(call.empiricalDelay)}</div>
            `;
            list.appendChild(card);

            for (const s of (call.situations || [])) {
                const alert = document.createElement("div");
                alert.className = "dep-alert";
                alert.textContent = "⚠ " + (s.summary?.[0]?.value || t('service_disruption'));
                list.appendChild(alert);
            }
        }
    }
</script>
