<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Stops</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: inherit; font-size: 14px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #12121e; color: #e0e0e0; }
        #map { height: 260px; flex-shrink: 0; position: relative; }
        #card-strip { flex: 1; background: #1a1a2e; display: flex; overflow-x: auto; border-top: 2px solid #0f3460; scrollbar-width: thin; scrollbar-color: #0f3460 #1a1a2e; }
        .stop-card { min-width: 210px; flex-shrink: 0; padding: 12px 14px; border-right: 1px solid #0f3460; display: flex; flex-direction: column; gap: 4px; cursor: pointer; transition: background 0.1s; }
        .stop-card:hover { background: #16213e; }
        .stop-card.active { background: #1e2a4a; }
        .card-stop-name { font-weight: 700; color: #fff; font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-distance { color: #888; font-size: 10px; flex-shrink: 0; }
        .card-modes { display: flex; gap: 3px; flex-wrap: wrap; }
        .mode-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; color: #fff; }
        .departure-row { font-size: 11px; display: flex; gap: 5px; align-items: center; }
        .departure-row .dest { color: #ddd; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .departure-row .time { color: #ddd; flex-shrink: 0; }
        .dep-delay { font-size: 10px; color: #e67e22; }
        .dep-delay.delay-ok { color: #27ae60; }
        .no-departures { color: #555; font-size: 11px; margin-top: 4px; }
        .map-overlay { position: absolute; z-index: 1000; background: rgba(22,33,62,0.92); color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 11px; pointer-events: none; }
        .status-card { min-width: 210px; padding: 12px 14px; color: #888; font-size: 12px; display: flex; align-items: center; }
        .leaflet-popup-content { min-width: 160px; }
        .popup-stop-name { font-weight: 700; font-size: 13px; }
        .popup-dep { font-size: 11px; margin-top: 4px; display: flex; gap: 6px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="card-strip"><div class="status-card">Waiting for data…</div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { App } from "https://unpkg.com/@modelcontextprotocol/ext-apps@0.4.2/dist/src/app-with-deps.js";

        const app = new App({ name: "nearby-stops", version: "1.0.0" });
        let leafletMap = null;
        let originMarker = null;
        let radiusCircle = null;
        const stopMarkers = [];
        let titleOverlay = null;
        let countOverlay = null;

        const i18n = {
            en: {
                title:            "Nearby Stops",
                no_stops:         "No stops found within radius",
                stop_found_one:   "stop found",
                stop_found_many:  "stops found",
                usually_on_time:  "Usually on time",
                typically_late:   "Typically {0} min late",
                up_to:            "up to {0} min",
                near_subtitle:    "Near {0} · {1}m radius",
                origin:           "Origin",
                parse_error:      "Parse error: {0}",
                data_error:       "Error: {0}",
                no_departures:    "No departures now",
            },
            nb: {
                title:            "Nærmeste stopp",
                no_stops:         "Ingen stopp funnet i nærheten",
                stop_found_one:   "stopp funnet",
                stop_found_many:  "stopp funnet",
                usually_on_time:  "Vanligvis i rute",
                typically_late:   "Vanligvis {0} min forsinket",
                up_to:            "opptil {0} min",
                near_subtitle:    "Nær {0} · {1}m radius",
                origin:           "Opprinnelse",
                parse_error:      "Lesefeil: {0}",
                data_error:       "Feil: {0}",
                no_departures:    "Ingen avganger nå",
            },
            nn: {
                title:            "Næraste stopp",
                no_stops:         "Ingen stopp funne i nærleiken",
                stop_found_one:   "stopp funne",
                stop_found_many:  "stopp funne",
                usually_on_time:  "Vanlegvis i rute",
                typically_late:   "Vanlegvis {0} min forseinka",
                up_to:            "opptil {0} min",
                near_subtitle:    "Nær {0} · {1}m radius",
                origin:           "Opphav",
                parse_error:      "Lesefeil: {0}",
                data_error:       "Feil: {0}",
                no_departures:    "Ingen avgangar no",
            },
        };
        let lang = 'en';
        function t(key, ...args) {
            let s = (i18n[lang] || i18n.en)[key] || key;
            args.forEach((v, i) => s = s.replace(`{${i}}`, v));
            return s;
        }

        const cardStripEl = document.getElementById('card-strip');

        function esc(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function modeColor(mode) {
            const colors = { bus: '#3787bd', rail: '#e67e22', metro: '#8e44ad', tram: '#27ae60', water: '#2980b9', air: '#c0392b' };
            return colors[(mode || '').toLowerCase()] || '#555';
        }

        function safeHex(v) {
            return (v && /^[0-9A-Fa-f]{6}$/.test(v)) ? '#' + v : null;
        }

        function lineColor(line) {
            return safeHex(line?.presentation?.colour) || modeColor(line?.transportMode);
        }

        function lineTextColor(line) {
            return safeHex(line?.presentation?.textColour) || '#ffffff';
        }

        function parseDurationSecs(dur) {
            if (!dur) return 0;
            const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?/);
            if (!m) return 0;
            return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseFloat(m[3] || 0);
        }

        function formatDelay(empiricalDelay) {
            if (!empiricalDelay) return null;
            const p50 = parseDurationSecs(empiricalDelay.p50);
            const p90 = parseDurationSecs(empiricalDelay.p90);
            if (p50 < 60) return { text: t('usually_on_time'), ok: true };
            const mins = Math.round(p50 / 60);
            const upTo = p90 > p50 + 120 ? `, ${t('up_to', Math.round(p90 / 60))}` : '';
            return { text: t('typically_late', mins) + upTo, ok: false };
        }

        function formatTime(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleTimeString(lang === 'en' ? 'en-GB' : lang === 'nn' ? 'nn-NO' : 'nb-NO', { hour: '2-digit', minute: '2-digit' });
        }

        function makeStopIcon(modes) {
            const color = modeColor(modes?.[0]);
            const html = `<div style="width:22px;height:22px;border-radius:50%;background:${color};` +
                `border:2px solid #fff;box-shadow:0 2px 4px #0006;"></div>`;
            return L.divIcon({ html, className: '', iconSize: [22, 22], iconAnchor: [11, 11] });
        }

        function departureRows(calls) {
            return (calls ?? []).map(c => {
                const line = c.serviceJourney?.line;
                const delay = formatDelay(c.empiricalDelay);
                return `<div class="popup-dep">` +
                    `<span class="line-code" style="background:${lineColor(line)};color:${lineTextColor(line)};padding:1px 5px;border-radius:3px">${esc(line?.publicCode ?? '?')}</span>` +
                    `<span>${esc(c.destinationDisplay?.frontText ?? '')}</span>` +
                    `<span style="margin-left:auto">${formatTime(c.expectedDepartureTime)}${delay ? ` <span class="dep-delay${delay.ok ? ' delay-ok' : ''}">${esc(delay.text)}</span>` : ''}</span>` +
                    `</div>`;
            }).join('');
        }

        function render(data) {
            const edges = data?.nearest?.edges ?? [];
            const q = data?.query ?? {};

            if (!leafletMap) {
                leafletMap = L.map('map').setView([q.latitude, q.longitude], 15);
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(leafletMap);

                const mapEl = document.getElementById('map');

                titleOverlay = document.createElement('div');
                titleOverlay.className = 'map-overlay';
                titleOverlay.style.cssText = 'top:10px;left:10px;max-width:60%;';
                mapEl.appendChild(titleOverlay);

                countOverlay = document.createElement('div');
                countOverlay.className = 'map-overlay';
                countOverlay.style.cssText = 'top:10px;right:10px;';
                mapEl.appendChild(countOverlay);
            }

            const subtitle = q.location
                ? ` &nbsp;·&nbsp; <span style="color:#aaa;font-weight:400">${esc(t('near_subtitle', q.location, q.radiusMeters))}</span>`
                : '';
            titleOverlay.innerHTML = `<strong>${esc(t('title'))}</strong>${subtitle}`;
            countOverlay.textContent = edges.length > 0
                ? `${edges.length} ${edges.length === 1 ? t('stop_found_one') : t('stop_found_many')}`
                : t('no_stops');

            stopMarkers.forEach(m => leafletMap.removeLayer(m));
            stopMarkers.length = 0;
            if (originMarker) leafletMap.removeLayer(originMarker);
            if (radiusCircle) leafletMap.removeLayer(radiusCircle);
            cardStripEl.innerHTML = '';

            originMarker = L.circleMarker([q.latitude, q.longitude], {
                radius: 7, color: '#e74c3c', fillColor: '#e74c3c', fillOpacity: 1, weight: 2
            }).addTo(leafletMap).bindTooltip(esc(q.location || t('origin')), { permanent: false });

            radiusCircle = L.circle([q.latitude, q.longitude], {
                radius: q.radiusMeters,
                color: '#3498db', weight: 1, fillColor: '#3498db', fillOpacity: 0.04
            }).addTo(leafletMap);

            const cardEls = [];

            function setActive(idx) {
                cardEls.forEach((c, i) => c.classList.toggle('active', i === idx));
            }

            edges.forEach(({ node }, idx) => {
                const stop = node?.place;
                if (!stop?.latitude) return;

                const modes = stop.transportMode ?? [];
                const calls = (stop.estimatedCalls ?? []).slice(0, 4);

                const marker = L.marker([stop.latitude, stop.longitude], { icon: makeStopIcon(modes) })
                    .addTo(leafletMap);

                marker.bindPopup(
                    `<div class="popup-stop-name">${esc(stop.name)}</div>` +
                    `<small style="color:#888">${modes.map(esc).join(', ')} · ${Math.round(node.distance)}m</small>` +
                    departureRows(calls)
                );
                stopMarkers.push(marker);

                const modeBadges = modes.map(m =>
                    `<span class="mode-badge" style="background:${modeColor(m)}">${esc(m)}</span>`
                ).join('');

                const depRowsHtml = calls.map(c => {
                    const line = c.serviceJourney?.line;
                    const delay = formatDelay(c.empiricalDelay);
                    const delayHtml = delay
                        ? ` <span class="dep-delay${delay.ok ? ' delay-ok' : ''}">${esc(delay.text)}</span>`
                        : '';
                    return `<div class="departure-row">` +
                        `<span class="mode-badge" style="background:${lineColor(line)};color:${lineTextColor(line)}">${esc(line?.publicCode ?? '?')}</span>` +
                        `<span class="dest">${esc(c.destinationDisplay?.frontText ?? '')}</span>` +
                        `<span class="time">${formatTime(c.expectedDepartureTime)}${delayHtml}</span>` +
                        `</div>`;
                }).join('');

                const card = document.createElement('div');
                card.className = 'stop-card' + (idx === 0 ? ' active' : '');
                card.innerHTML =
                    `<div style="display:flex;align-items:baseline;gap:6px;">` +
                        `<span class="card-stop-name">${esc(stop.name)}</span>` +
                        `<span class="card-distance">${Math.round(node.distance)}m</span>` +
                    `</div>` +
                    `<div class="card-modes">${modeBadges}</div>` +
                    (calls.length > 0 ? depRowsHtml : `<div class="no-departures">${t('no_departures')}</div>`);

                card.addEventListener('click', () => {
                    setActive(idx);
                    leafletMap.panTo([stop.latitude, stop.longitude]);
                    marker.openPopup();
                });

                marker.on('click', () => {
                    setActive(idx);
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
                });

                cardEls.push(card);
                cardStripEl.appendChild(card);
            });

            if (edges.length === 0) {
                const placeholder = document.createElement('div');
                placeholder.className = 'status-card';
                placeholder.textContent = t('no_stops');
                cardStripEl.appendChild(placeholder);
            }

            if (edges.length > 0) {
                const group = L.featureGroup([originMarker, ...stopMarkers]);
                leafletMap.fitBounds(group.getBounds(), { padding: [20, 20] });
            }
        }

        app.ontoolresult = (result) => {
            try {
                const text = result?.content?.find(c => c.type === "text")?.text;
                const data = JSON.parse(text ?? '{}');
                if (data.error) {
                    lang = data.language || lang;
                    cardStripEl.innerHTML = '';
                    const errCard = document.createElement('div');
                    errCard.className = 'status-card';
                    errCard.textContent = t('data_error', data.message || data.error);
                    cardStripEl.appendChild(errCard);
                    return;
                }
                lang = data.language || 'en';
                render(data);
            } catch (e) {
                cardStripEl.innerHTML = '';
                const errCard = document.createElement('div');
                errCard.className = 'status-card';
                errCard.textContent = t('parse_error', e.message);
                cardStripEl.appendChild(errCard);
            }
        };

        await app.connect();
    </script>
</body>
</html>
