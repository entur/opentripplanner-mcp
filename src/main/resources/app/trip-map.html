<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #0f0f23; color: #e8e8e8; min-height: 100vh; }
        #app { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

        #header { padding: 10px 14px; background: #16213e;
                  display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
                  border-bottom: 1px solid #1e2a4a; flex-shrink: 0; }
        #route-label { font-size: 14px; font-weight: 700; }
        #replan-btn { font-size: 11px; padding: 4px 10px; border: 1px solid #3a3a5a;
                      border-radius: 6px; background: transparent; color: #aaa; cursor: pointer; flex-shrink: 0; }
        #replan-btn:hover { background: #2a2a4a; color: #e8e8e8; }
        #replan-btn:disabled { opacity: 0.4; cursor: default; }

        #map { height: 260px; flex-shrink: 0; background: #1e2235; }

        #leg-strip { background: #0a0a1e; border-top: 1px solid #1e1e35;
                     padding: 6px 12px; display: flex; gap: 5px; align-items: center;
                     flex-wrap: wrap; font-size: 10px; color: #888; min-height: 30px; flex-shrink: 0; }
        .strip-sep { color: #333; }
        .strip-dest { color: #4ecdc4; }

        #vehicle-status { font-size: 10px; color: #666; padding: 2px 12px 4px;
                          min-height: 16px; flex-shrink: 0; }
        #vehicle-status.ok  { color: #4ecdc4; }
        #vehicle-status.err { color: #ff6b6b; }

        #patterns { padding: 4px 0 8px; overflow-y: auto; }

        .pattern { margin: 4px 8px; border: 1px solid #2a2a4a; border-radius: 8px;
                   overflow: hidden; cursor: pointer; transition: border-color .15s; }
        .pattern:hover { border-color: #4a4a7a; }
        .pattern.active { border-color: #7c7cf8; box-shadow: 0 0 0 2px #7c7cf822; }
        .pattern:not(.active) { opacity: 0.6; }
        .pattern-main { padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
        .pattern.active .pattern-main { background: #1e1e38; }
        .pattern-times { font-size: 13px; font-weight: 700; white-space: nowrap; }
        .leg-bar { flex: 1; height: 7px; border-radius: 4px; overflow: hidden; display: flex; min-width: 60px; }
        .lb { height: 100%; }
        .pattern-dur { font-size: 11px; color: #888; white-space: nowrap;
                       display: flex; align-items: center; gap: 4px; }
        .delay-badge { font-size: 9px; color: #ff6b6b; background: #ff6b2222;
                       border: 1px solid #ff6b2244; border-radius: 3px; padding: 1px 4px; }

        /* Selected card leg detail */
        .leg-rows { padding: 6px 12px 8px; background: #0f0f23; display: flex; flex-direction: column; gap: 1px; }
        .transit-leg { display: flex; flex-direction: column; gap: 3px; padding: 5px 0; border-top: 1px solid #1e1e35; }
        .transit-stop { font-size: 10px; color: #888; }
        .transit-badge-row { display: flex; align-items: center; gap: 8px; }
        .transit-badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px;
                         padding: 4px 11px 4px 7px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .mode-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .transit-arrival { margin-left: auto; font-size: 11px; color: #888; white-space: nowrap; }
        .transit-times { font-size: 11px; display: flex; gap: 6px; align-items: center; padding-left: 2px; }
        .time-delayed { color: #ff6b6b; }
        .time-aimed { text-decoration: line-through; color: #555; }
        .time-ontime { color: #aaa; }
        .walk-connector { display: flex; align-items: center; gap: 5px; padding: 3px 0;
                          color: #555; font-size: 11px; border-top: 1px solid #1e1e35; }

        /* Unselected compact card */
        .compact-row { padding: 9px 12px; display: flex; align-items: center; gap: 8px; }
        .compact-times { font-size: 12px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
        .compact-badges { display: flex; align-items: center; gap: 4px; flex: 1; flex-wrap: wrap; overflow: hidden; }
        .compact-dur { font-size: 11px; color: #666; white-space: nowrap; flex-shrink: 0; }
        .mini-badge { display: inline-flex; align-items: center; gap: 3px; border-radius: 20px;
                      padding: 2px 7px 2px 5px; font-size: 10px; font-weight: 700; }
        .mini-mode-icon { width: 13px; height: 13px; flex-shrink: 0; }
        .mini-walk { font-size: 10px; color: #555; }

        .badge { display: inline-flex; align-items: center; justify-content: center;
                 min-width: 28px; padding: 2px 5px; border-radius: 3px; font-weight: 700; font-size: 10px; color: #fff; }

        #status { padding: 40px; text-align: center; color: #555; font-size: 15px; }

        .leg-meta { display: flex; gap: 6px; align-items: center; margin-top: 2px; flex-wrap: wrap; }
        .leg-emission { font-size: 10px; color: #27ae60; background: #0a1f0a; border: 1px solid #1a4a1a; border-radius: 3px; padding: 1px 4px; }
        .leg-delay { font-size: 10px; color: #e67e22; background: #2a1a0a; border: 1px solid #5a3010; border-radius: 3px; padding: 1px 4px; }
        .leg-delay.delay-ok { color: #27ae60; background: #0a1f0a; border-color: #1a4a1a; }
        .occ-widget { display: flex; align-items: center; gap: 4px; }
        .occ-icon { font-size: 11px; opacity: 0.7; }
        .occ-bar-track { width: 36px; height: 7px; border-radius: 4px; background: #2a2a4a; overflow: hidden; }
        .occ-bar-fill { height: 100%; border-radius: 4px; }
        .occ-bar-fill.teal  { background: #4ecdc4; }
        .occ-bar-fill.amber { background: #ffaa6b; }
        .occ-bar-fill.red   { background: #ff6b6b; }
        .occ-label { font-size: 10px; font-weight: 500; }
        .occ-label.teal  { color: #4ecdc4; }
        .occ-label.amber { color: #ffaa6b; }
        .occ-label.red   { color: #ff6b6b; }
    </style>
</head>

    function modeIcon(mode) {
        const key = (mode || "").toLowerCase();
        if (key === "coach") return MODE_ICONS.bus;
        if (key === "subway") return MODE_ICONS.metro;
        if (key === "rail") return MODE_ICONS.train;
        if (key === "water") return MODE_ICONS.ferry;
        if (key === "air") return MODE_ICONS.plane;
        return MODE_ICONS[key] || "";
    }

    function modeColor(mode) {
        return MODE_COLORS[(mode || "").toLowerCase()] || "#444";
    }

    function safeHex(v) {
        return v && /^[0-9a-fA-F]{3,8}$/.test(v) ? "#" + v : null;
    }

    function legColor(leg) {
        return safeHex(leg.line?.presentation?.colour) || modeColor(leg.mode);
    }

    function legTextColor(leg) {
        return safeHex(leg.line?.presentation?.textColour) || "#ffffff";
    }

    function esc(v) {
        return String(v ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    // Google Polyline Algorithm Format decoder (1e5 precision)
    function decodePolyline(encoded) {
        const result = [];
        let i = 0, lat = 0, lng = 0;
        while (i < encoded.length) {
            let shift = 0, val = 0, b;
            do { b = encoded.charCodeAt(i++) - 63; val |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lat += (val & 1) ? ~(val >> 1) : (val >> 1);
            shift = 0; val = 0;
            do { b = encoded.charCodeAt(i++) - 63; val |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lng += (val & 1) ? ~(val >> 1) : (val >> 1);
            result.push([lat / 1e5, lng / 1e5]);
        }
        return result;
    }

    function fmt(iso) {
        if (!iso) return "--:--";
        return new Date(iso).toLocaleTimeString(lang === 'en' ? 'en-GB' : lang === 'nn' ? 'nn-NO' : 'nb-NO', { hour: "2-digit", minute: "2-digit" });
    }

    function fmtDuration(secs) {
        if (secs == null) return "";
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
    }

    function parseDurationSecs(dur) {
        if (!dur) return 0;
        const m = dur.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?/);
        if (!m) return 0;
        return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseFloat(m[3] || 0);
    }

    function occupancyWidget(status) {
        const levels = {
            EMPTY:                      { pct: 0,   color: "teal",  label: "" },
            MANY_SEATS_AVAILABLE:       { pct: 20,  color: "teal",  label: t('occ_empty') },
            FEW_SEATS_AVAILABLE:        { pct: 55,  color: "teal",  label: t('occ_seats') },
            STANDING_ROOM_ONLY:         { pct: 80,  color: "amber", label: t('occ_busy') },
            FULL:                       { pct: 100, color: "red",   label: t('occ_full') },
            CRUSHED_STANDING_ROOM_ONLY: { pct: 100, color: "red",   label: t('occ_full') },
        };
        const info = levels[status] || { pct: 0, color: "teal", label: "" };
        if (!info.label) return "";
        return `<div class="occ-widget">
            <span class="occ-icon">🧍</span>
            <div class="occ-bar-track"><div class="occ-bar-fill ${info.color}" style="width:${info.pct}%"></div></div>
            <span class="occ-label ${info.color}">${info.label}</span>
        </div>`;
    }

    function renderLegRows(legs) {
        let html = '<div class="leg-rows">';
        let firstTransitLeg = true;
        for (const leg of legs) {
            const isFoot = (leg.mode || "").toLowerCase() === "foot";
            if (isFoot) {
                const mins = Math.round((leg.duration || 0) / 60);
                const icon = MODE_ICONS.foot || "";
                html += `<div class="walk-connector">
                    <svg width="12" height="12" viewBox="0 0 16 16" style="flex-shrink:0;color:#555;">${icon}</svg>
                    ${t('walk_min', mins)}
                </div>`;
            } else {
                const borderStyle = firstTransitLeg ? ' style="border-top:none"' : '';
                firstTransitLeg = false;
                const stopName = esc(leg.fromPlace?.name || "");
                const color = esc(legColor(leg));
                const textColor = esc(legTextColor(leg));
                const code = esc(leg.line?.publicCode || leg.mode || "?");
                const dest = esc(leg.fromEstimatedCall?.destinationDisplay?.frontText || "");
                const label = dest ? `${code} ${dest}` : code;
                const icon = modeIcon(leg.mode);

                const depAimed = leg.aimedStartTime;
                const depExpected = leg.expectedStartTime;
                const arrival = leg.expectedEndTime;
                const delayMs = depAimed && depExpected
                    ? new Date(depExpected) - new Date(depAimed) : 0;

                const timesHtml = delayMs > 60_000
                    ? `<span class="time-delayed">${esc(fmt(depExpected))}</span>
                       <span class="time-aimed">${esc(fmt(depAimed))}</span>`
                    : `<span class="time-ontime">${esc(fmt(depAimed))}</span>`;

                const emissionCo2 = leg.emission?.co2;
                const metaParts = [];
                const occHtml = occupancyWidget(leg.fromEstimatedCall?.occupancyStatus);
                if (occHtml) metaParts.push(occHtml);
                if (emissionCo2 != null) metaParts.push(`<span class="leg-emission">${Math.round(emissionCo2)}g CO₂</span>`);
                for (const [label, ed] of [["Departure", leg.fromEstimatedCall?.empiricalDelay], ["Arrival", leg.toEstimatedCall?.empiricalDelay]]) {
                    if (!ed) continue;
                    const p50 = parseDurationSecs(ed.p50);
                    const p90 = parseDurationSecs(ed.p90);
                    const isDep = label === "Departure";
                    if (p50 < 60) {
                        metaParts.push(`<span class="leg-delay delay-ok">${isDep ? t('dep_usually_ok') : t('arr_usually_ok')}</span>`);
                    } else {
                        const mins = Math.round(p50 / 60);
                        const upTo = p90 > p50 + 120 ? `, ${t('up_to', Math.round(p90 / 60))}` : "";
                        const key = isDep ? 'dep_typically_late' : 'arr_typically_late';
                        metaParts.push(`<span class="leg-delay">${t(key, mins)}${upTo}</span>`);
                    }
                }
                const legMetaHtml = metaParts.length > 0 ? `<div class="leg-meta">${metaParts.join("")}</div>` : "";

                html += `<div class="transit-leg"${borderStyle}>
                    <div class="transit-stop">${stopName}</div>
                    <div class="transit-badge-row">
                        <div class="transit-badge" style="background:${color};color:${textColor};">
                            <svg class="mode-icon" viewBox="0 0 16 16" fill="currentColor"
                                 style="color:${textColor};">${icon}</svg>
                            ${label}
                        </div>
                        <span class="transit-arrival">${esc(fmt(arrival))}</span>
                    </div>
                    <div class="transit-times">${timesHtml}</div>
                    ${legMetaHtml}
                </div>`;
            }
        }
        html += "</div>";
        return html;
    }

    function renderCompactBadges(legs) {
        let html = "";
        let prevWasFoot = false;
        let first = true;
        for (const leg of legs) {
            const isFoot = (leg.mode || "").toLowerCase() === "foot";
            if (isFoot) { prevWasFoot = true; continue; }
            if (!first && prevWasFoot) {
                html += `<span class="mini-walk">${t('walk_label')}</span>`;
            }
            first = false;
            prevWasFoot = false;
            const color = esc(legColor(leg));
            const textColor = esc(legTextColor(leg));
            const code = esc(leg.line?.publicCode || leg.mode || "?");
            const icon = modeIcon(leg.mode);
            html += `<div class="mini-badge" style="background:${color};color:${textColor};">
                <svg class="mini-mode-icon" viewBox="0 0 16 16" fill="currentColor"
                     style="color:${textColor};">${icon}</svg>
                ${code}
            </div>`;
        }
        return html;
    }

    function buildPatternCard(i, p, isActive) {
        const legs = p.legs || [];
        const totalDur = p.duration || 1;

        const firstTransit = legs.find(l => (l.mode || "").toLowerCase() !== "foot");
        let delayBadge = "";
        if (firstTransit) {
            const { expectedStartTime: est, aimedStartTime: ast } = firstTransit;
            const ms = est && ast ? new Date(est) - new Date(ast) : 0;
            if (ms > 60_000) {
                delayBadge = `<span class="delay-badge">+${Math.round(ms / 60_000)} min</span>`;
            }
        }

        const barSegs = legs.map(leg => {
            const w = Math.round(((leg.duration || 0) / totalDur) * 100);
            const c = (leg.mode || "").toLowerCase() === "foot" ? "#3a3a5a" : legColor(leg);
            return `<div class="lb" style="width:${w}%;background:${esc(c)};"></div>`;
        }).join("");

        if (isActive) {
            return `<div class="pattern active" data-index="${i}">
                <div class="pattern-main">
                    <span class="pattern-times">${esc(fmt(p.expectedStartTime))} – ${esc(fmt(p.expectedEndTime))}</span>
                    <div class="leg-bar">${barSegs}</div>
                    <span class="pattern-dur">${esc(fmtDuration(p.duration))}${delayBadge}</span>
                </div>
                ${renderLegRows(legs)}
            </div>`;
        }
        return `<div class="pattern" data-index="${i}">
            <div class="compact-row">
                <span class="compact-times">${esc(fmt(p.expectedStartTime))}</span>
                <div class="compact-badges">${renderCompactBadges(legs)}</div>
                <span class="compact-dur">${esc(fmtDuration(p.duration))}</span>
            </div>
        </div>`;
    }

    function renderPatterns() {
        const container = document.getElementById("patterns");
        container.innerHTML = currentPatterns
            .map((p, i) => buildPatternCard(i, p, i === activeIndex))
            .join("");
        container.querySelectorAll(".pattern").forEach(el => {
            el.addEventListener("click", () => selectPattern(parseInt(el.dataset.index, 10)));
        });
    }

    function initMap() {
        if (leafletMap) return;
        leafletMap = L.map("map", { zoomControl: true });
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© <a href='https://openstreetmap.org/copyright'>OpenStreetMap</a> contributors",
            maxZoom: 19,
        }).addTo(leafletMap);
    }

    function drawRoute(pattern) {
        routeLayers.forEach(l => leafletMap.removeLayer(l));
        routeLayers = [];

        const allPoints = [];
        const legs = pattern.legs || [];

        for (const leg of legs) {
            const isFoot = (leg.mode || "").toLowerCase() === "foot";
            const color = legColor(leg);

            let points = null;
            if (leg.pointsOnLink?.points) {
                const decoded = decodePolyline(leg.pointsOnLink.points);
                if (decoded.length > 0) points = decoded;
            }
            if (!points && leg.fromPlace?.latitude != null && leg.toPlace?.latitude != null) {
                points = [
                    [leg.fromPlace.latitude, leg.fromPlace.longitude],
                    [leg.toPlace.latitude, leg.toPlace.longitude]
                ];
            }
            if (!points) continue;

            allPoints.push(...points);

            const line = L.polyline(points, {
                color,
                weight: isFoot ? 2.5 : 4,
                dashArray: isFoot ? "6 5" : null,
                opacity: 0.9,
            }).addTo(leafletMap);
            routeLayers.push(line);

            if (!isFoot) {
                for (const call of (leg.intermediateEstimatedCalls || [])) {
                    if (call.quay?.latitude == null) continue;
                    const dot = L.circleMarker([call.quay.latitude, call.quay.longitude], {
                        radius: 3, color, weight: 1, fillColor: color, fillOpacity: 0.6,
                    }).addTo(leafletMap);
                    routeLayers.push(dot);
                }
            }
        }

        // Transfer dots at leg boundaries (not first/last)
        for (let i = 0; i < legs.length - 1; i++) {
            const p = legs[i].toPlace;
            if (p?.latitude == null) continue;
            const dot = L.circleMarker([p.latitude, p.longitude], {
                radius: 4, color: "#fff", weight: 2,
                fillColor: legColor(legs[i]), fillOpacity: 1,
            }).addTo(leafletMap);
            routeLayers.push(dot);
        }

        // Origin marker
        const first = legs[0];
        if (first?.fromPlace?.latitude != null) {
            const m = L.circleMarker([first.fromPlace.latitude, first.fromPlace.longitude], {
                radius: 8, color: "#fff", weight: 2, fillColor: "#7c7cf8", fillOpacity: 1,
            }).addTo(leafletMap);
            routeLayers.push(m);
        }

        // Destination marker
        const last = legs[legs.length - 1];
        if (last?.toPlace?.latitude != null) {
            const m = L.circleMarker([last.toPlace.latitude, last.toPlace.longitude], {
                radius: 8, color: "#fff", weight: 2, fillColor: "#4ecdc4", fillOpacity: 1,
            }).addTo(leafletMap);
            routeLayers.push(m);
        }

        if (allPoints.length > 0) {
            leafletMap.fitBounds(allPoints, { padding: [20, 20] });
        }
    }

    function renderLegStrip(pattern) {
        const strip = document.getElementById("leg-strip");
        strip.innerHTML = "";
        const legs = pattern.legs || [];

        legs.forEach((leg, idx) => {
            const isFoot = (leg.mode || "").toLowerCase() === "foot";
            const el = document.createElement("span");

            if (isFoot) {
                const mins = Math.round((leg.duration || 0) / 60);
                el.innerHTML = `<span class="badge" style="background:#2a2a2a;border:1px solid #444;color:#888;">${t('walk_m', mins)}</span>`;
            } else {
                const code = esc(leg.line?.publicCode || leg.mode || "?");
                const stops = (leg.intermediateEstimatedCalls || []).length + 1;
                el.innerHTML = `<span class="badge" style="background:${esc(legColor(leg))};color:${esc(legTextColor(leg))}">${code}</span>`
                    + ` <span style="color:#666;font-size:10px;">· ${stops} ${stops !== 1 ? t('stop_many') : t('stop_one')}</span>`;
            }
            strip.appendChild(el);

            if (idx < legs.length - 1) {
                const sep = document.createElement("span");
                sep.className = "strip-sep";
                sep.textContent = "›";
                strip.appendChild(sep);
            }
        });

        const last = legs[legs.length - 1];
        if (last?.toPlace?.name) {
            const sep = document.createElement("span");
            sep.className = "strip-sep";
            sep.textContent = "›";
            strip.appendChild(sep);
            const dest = document.createElement("span");
            dest.className = "strip-dest";
            dest.textContent = last.toPlace.name;
            strip.appendChild(dest);
        }
    }

    function findCurrentLeg(legs) {
        const now = Date.now();
        const transitLegs = legs.filter(l => (l.mode || "").toLowerCase() !== "foot");
        if (transitLegs.length === 0) return null;

        const active = transitLegs.find(l => {
            const start = l.expectedStartTime ? new Date(l.expectedStartTime).getTime() : null;
            const end = l.expectedEndTime ? new Date(l.expectedEndTime).getTime() : null;
            return start != null && end != null && start <= now && now <= end;
        });
        if (active) return active;

        const firstStart = transitLegs[0].expectedStartTime
            ? new Date(transitLegs[0].expectedStartTime).getTime() : null;
        if (firstStart != null && firstStart > now) return transitLegs[0];

        return null; // trip entirely in the past
    }

    function clearVehicleMarker() {
        if (vehicleMarker && leafletMap) {
            leafletMap.removeLayer(vehicleMarker);
            vehicleMarker = null;
        }
    }

    function updateVehicleMarker(vehicle, leg) {
        if (!leafletMap || !vehicle.location) return;
        const { latitude, longitude } = vehicle.location;

        const stale = vehicle.vehicleStatus === "PARKED" ||
            (vehicle.lastUpdated &&
             (Date.now() - new Date(vehicle.lastUpdated).getTime()) > 90_000);

        const color = legColor(leg);
        const textColor = legTextColor(leg);
        const icon = modeIcon(leg.mode);
        const opacity = stale ? "opacity:0.4;" : "";
        const hasBearing = vehicle.bearing != null && !stale;

        const iconSvg = `<svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" ` +
            `style="color:${textColor};">${icon}</svg>`;
        const circle = `<div style="width:28px;height:28px;border-radius:50%;background:${color};` +
            `display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px #0009;">` +
            (hasBearing ? `<div style="transform:rotate(-${vehicle.bearing}deg)">${iconSvg}</div>` : iconSvg) +
            `</div>`;

        let html, size, anchor;
        if (hasBearing) {
            const arrow = `<div style="width:0;height:0;margin-bottom:-1px;` +
                `border-left:6px solid transparent;border-right:6px solid transparent;` +
                `border-bottom:9px solid ${color};"></div>`;
            html = `<div style="display:flex;flex-direction:column;align-items:center;` +
                `transform:rotate(${vehicle.bearing}deg);${opacity}">${arrow}${circle}</div>`;
            size = [28, 37];
            anchor = [14, 23]; // center of circle: 9px arrow + 14px half-circle
        } else {
            html = `<div style="${opacity}">${circle}</div>`;
            size = [28, 28];
            anchor = [14, 14];
        }

        const divIcon = L.divIcon({ html, className: "", iconSize: size, iconAnchor: anchor });

        if (vehicleMarker) {
            vehicleMarker.setLatLng([latitude, longitude]);
            vehicleMarker.setIcon(divIcon);
        } else {
            vehicleMarker = L.marker([latitude, longitude], { icon: divIcon, zIndexOffset: 1000 })
                .addTo(leafletMap);
            const targetZoom = Math.min(leafletMap.getZoom(), 13);
            leafletMap.setView([latitude, longitude], targetZoom, { animate: true });
        }

        if (vehicle.vehicleId) {
            vehicleMarker.bindTooltip(esc(vehicle.vehicleId), { permanent: false, direction: "top" });
        }
    }

    function closeVehicleSubscription() {
        if (vehicleSocket) {
            try { vehicleSocket.send(JSON.stringify({ type: "complete", id: "1" })); } catch (_) {}
            vehicleSocket.close();
            vehicleSocket = null;
        }
    }

    function openVehicleSubscription(leg) {
        const serviceJourneyId = leg.serviceJourney?.id;
        if (!serviceJourneyId || !vehiclesWsUrl) return;

        setVehicleStatus("vehicle: connecting… (" + serviceJourneyId + ")");
        const socket = new WebSocket(vehiclesWsUrl, "graphql-transport-ws");
        vehicleSocket = socket;

        socket.onopen = () => {
            setVehicleStatus("vehicle: handshake…");
            socket.send(JSON.stringify({
                type: "connection_init",
                payload: { headers: { "Et-Client-Name": "entur-mcp" } }
            }));
        };

        socket.onmessage = (event) => {
            let msg;
            try { msg = JSON.parse(event.data); } catch (_) { return; }

            if (msg.type === "connection_ack") {
                setVehicleStatus("vehicle: subscribed, waiting…");
                socket.send(JSON.stringify({
                    type: "subscribe",
                    id: "1",
                    payload: {
                        query: "subscription VehiclePos($id: String!) { vehicles(serviceJourneyId: $id) { location { latitude longitude } bearing vehicleId lastUpdated vehicleStatus } }",
                        variables: { id: serviceJourneyId }
                    }
                }));
            } else if (msg.type === "next") {
                const vehicles = msg.payload?.data?.vehicles;
                if (vehicles?.length > 0) {
                    setVehicleStatus("vehicle: tracking " + (vehicles[0].vehicleId || ""), "ok");
                    updateVehicleMarker(vehicles[0], leg);
                } else {
                    setVehicleStatus("vehicle: no vehicle found for journey");
                }
            } else if (msg.type === "complete" || msg.type === "error") {
                const detail = msg.type === "error" ? JSON.stringify(msg.payload) : "complete";
                setVehicleStatus("vehicle: " + detail, "err");
                if (vehicleSocket === socket) { vehicleSocket = null; clearVehicleMarker(); }
            }
        };

        socket.onclose = (e) => {
            if (vehicleSocket === socket) {
                setVehicleStatus("vehicle: connection closed (" + e.code + (e.reason ? " " + e.reason : "") + ")", "err");
                vehicleSocket = null; clearVehicleMarker();
            }
        };
        socket.onerror = (e) => {
            if (vehicleSocket === socket) {
                setVehicleStatus("vehicle: connection error", "err");
                vehicleSocket = null; clearVehicleMarker();
            }
        };
    }

    function selectPattern(index) {
        activeIndex = index;
        clearVehicleMarker();
        closeVehicleSubscription();
        setVehicleStatus("");
        renderPatterns();
        const p = currentPatterns[index];
        if (p) {
            drawRoute(p);
            renderLegStrip(p);
            const leg = findCurrentLeg(p.legs || []);
            if (leg?.serviceJourney?.id) {
                openVehicleSubscription(leg);
            } else if (!leg) {
                setVehicleStatus("vehicle: trip in the past");
            } else {
                setVehicleStatus("vehicle: no service journey id on leg (" + (leg.mode || "?") + ")");
            }
        }
    }

    function showStatus(msg) {
        document.getElementById("patterns").innerHTML = `<div id="status">${esc(msg)}</div>`;
    }

    function render(data) {
        const query = data.query || {};
        document.getElementById("route-label").textContent =
            `${query.from || t('from_fallback')} → ${query.to || t('to_fallback')}`;

        currentPatterns = data.trip?.tripPatterns || [];
        if (currentPatterns.length === 0) { showStatus(t('no_trips')); return; }

        activeIndex = 0;
        initMap();
        selectPattern(0);
    }

    function applyToolResult(result) {
        try {
            const text = result.content?.find(c => c.type === "text")?.text;
            if (!text) { replanBtn.disabled = false; replanBtn.textContent = t('replan'); return; }
            const data = JSON.parse(text);
            lang = data.language || lang;
            if (data.error) { replanBtn.disabled = false; replanBtn.textContent = t('replan'); showStatus(data.message || data.error); return; }
            currentQuery = data.query ? { ...data.query, language: lang } : null;
            if (data.vehiclesWsUrl) vehiclesWsUrl = data.vehiclesWsUrl;
            replanBtn.disabled = !currentQuery;
            replanBtn.textContent = t('replan');
            render(data);
        } catch (e) {
            replanBtn.disabled = false;
            replanBtn.textContent = t('replan');
            showStatus(t('no_data'));
        }
    }

    app.ontoolresult = applyToolResult;

    await app.connect();

    replanBtn.addEventListener("click", async () => {
        if (!currentQuery) return;
        replanBtn.disabled = true;
        replanBtn.textContent = t('replanning');
        try {
            const result = await app.callServerTool({ name: "poll-trip", arguments: currentQuery });
            applyToolResult(result);
        } catch (e) {
            replanBtn.disabled = false;
            replanBtn.textContent = t('replan');
        }
    });

    window.addEventListener("beforeunload", () => {
        closeVehicleSubscription();
    });
</script>
</body>
</html>
